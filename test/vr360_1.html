<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR360 - Di Sản Văn Hóa Việt Nam</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" />

    <style>
        :root {
            --maroon: #722F37;
            --gold: #C5A059;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        #panorama {
            width: 100%;
            height: 100%;
        }

        /* UI Overlays */
        .ui-overlay {
            position: absolute;
            z-index: 100;
            pointer-events: auto;
        }

        /* Minimap Layout */
        .minimap {
            bottom: 25px;
            right: 25px;
            width: 260px;
            height: 170px;
            background: #fff;
            border: 4px solid #fff;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            overflow: hidden;
        }

        .minimap-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        /* Chấm đỏ trên Minimap */
        .map-marker {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #ef4444;
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

            .map-marker:hover {
                background: #fbbf24;
                transform: translate(-50%, -50%) scale(1.4);
            }

            .map-marker.active {
                background: #22c55e;
                box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.3);
                animation: pulse 2s infinite;
            }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }

            100% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* Custom Hotspot Tooltip */
        .custom-tooltip {
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div id="panorama"></div>

    <div class="ui-overlay top-6 left-6 flex items-center gap-4">
        <a href="index.html" class="w-12 h-12 bg-white/90 rounded-full flex items-center justify-center shadow-lg hover:bg-red-800 hover:text-white transition-all">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="bg-white/90 backdrop-blur-md px-6 py-3 rounded-2xl shadow-xl border-l-4 border-red-800">
            <h1 class="text-red-900 font-bold uppercase text-sm tracking-tighter" id="title-display">Di Sản VR360</h1>
            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Không gian trải nghiệm số</p>
        </div>
    </div>

    <div class="ui-overlay minimap hidden md:block">
        <div class="absolute top-0 left-0 bg-red-800 text-[8px] text-white px-3 py-1 font-bold rounded-br-lg z-10 uppercase">Sơ đồ vị trí</div>
        <img src="https://images.unsplash.com/photo-1599708153386-62bf3f033230?w=400" class="minimap-img" alt="Flycam view">
        <div id="markers-layer" class="absolute inset-0"></div>
    </div>

    <div class="ui-overlay bottom-6 left-1/2 -translate-x-1/2 bg-black/40 text-white/80 px-4 py-2 rounded-full text-[10px] uppercase tracking-widest backdrop-blur-sm pointer-events-none">
        Kéo chuột để xoay • Cuộn để phóng to
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>

    <script>
        // --- CẤU HÌNH DỮ LIỆU VR ---
        const vrConfig = {
            firstScene: "gate",
            scenes: {
                "gate": {
                    "title": "Cổng Đình Vĩnh Phong",
                    "panorama": "https://pannellum.org/images/alma.jpg", // Thay bằng ảnh 4:1 của bạn
                    "autoRotate": -1.5,
                    // Giới hạn cho ảnh tỉ lệ 4:1
                    "pitch": 0,
                    "minPitch": -20, // Khóa không cho nhìn xuống quá sâu
                    "maxPitch": 20,  // Khóa không cho nhìn lên quá cao
                    "hfov": 110,     // Góc nhìn ngang rộng để ảnh phẳng hơn
                    "mapX": 50, "mapY": 85, // Vị trí % trên minimap
                    "hotSpots": [
                        {
                            "pitch": -2, "yaw": 15, "type": "info",
                            "text": "Xem Video Lễ Hội",
                            "clickHandlerFunc": () => openVideoModal("https://www.youtube.com/watch?v=dQw4w9WgXcQ")
                        },
                        {
                            "pitch": 0, "yaw": -30, "type": "info",
                            "text": "Bộ sưu tập ảnh cổ",
                            "clickHandlerFunc": () => openImageModal([
                                "https://images.unsplash.com/photo-1528154291023-a6525fabe5b4?w=1000",
                                "https://images.unsplash.com/photo-1555921015-5532091f6026?w=1000"
                            ])
                        },
                        {
                            "pitch": -5, "yaw": 120, "type": "scene",
                            "text": "Đi vào Chánh điện", "sceneId": "main_hall"
                        }
                    ]
                },
                "main_hall": {
                    "title": "Chánh Điện Linh Thiêng",
                    "panorama": "https://pannellum.org/images/cerro-toco-0.jpg",
                    "pitch": 0, "minPitch": -25, "maxPitch": 25, "hfov": 100,
                    "mapX": 50, "mapY": 40,
                    "hotSpots": [
                        {
                            "pitch": -10, "yaw": 0, "type": "scene",
                            "text": "Quay ra cổng", "sceneId": "gate"
                        }
                    ]
                }
            }
        };

        // --- KHỞI TẠO VIEWER ---
        const viewer = pannellum.viewer('panorama', {
            "default": {
                "firstScene": vrConfig.firstScene,
                "author": "Heritage VN",
                "autoLoad": true,
                "sceneFadeDuration": 1200,
                "showControls": false // Ẩn control mặc định để dùng UI custom
            },
            "scenes": vrConfig.scenes
        });

        // --- HÀM XỬ LÝ MINIMAP ---
        function initMinimap() {
            const layer = document.getElementById('markers-layer');
            Object.keys(vrConfig.scenes).forEach(id => {
                const scene = vrConfig.scenes[id];
                const marker = document.createElement('div');
                marker.className = `map-marker marker-${id}`;
                marker.style.left = scene.mapX + '%';
                marker.style.top = scene.mapY + '%';

                marker.onclick = () => {
                    viewer.loadScene(id);
                };
                layer.appendChild(marker);
            });
            updateUI();
        }

        function updateUI() {
            const currentId = viewer.getScene();
            const sceneData = vrConfig.scenes[currentId];

            // Cập nhật tiêu đề
            document.getElementById('title-display').innerText = sceneData.title;

            // Cập nhật marker active
            document.querySelectorAll('.map-marker').forEach(m => m.classList.remove('active'));
            const activeMarker = document.querySelector(`.marker-${currentId}`);
            if(activeMarker) activeMarker.classList.add('active');
        }

        // Lắng nghe sự kiện chuyển cảnh
        viewer.on('load', updateUI);

        // --- HÀM MỞ MODAL (CÁCH A) ---
        function openVideoModal(url) {
            Fancybox.show([{ src: url, type: "video" }]);
        }

        function openImageModal(imgs) {
            const slides = imgs.map(src => ({ src, type: "image" }));
            Fancybox.show(slides);
        }

        // Khởi động minimap
        initMinimap();

    </script>
</body>
</html>

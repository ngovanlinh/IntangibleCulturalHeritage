<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu Di sản văn hóa phi vật thể</title>
    <link rel="icon" type="image/x-icon" href="images/logo.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root {
            --maroon: #722F37;
            --gold: #C5A059;
        }

        body {
            font-family: Arial, sans-serif;
            background: #F9F6F2;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        h1 {
            color: var(--maroon);
            border-bottom: 2px solid var(--gold);
            padding-bottom: 15px;
            font-family: 'Times New Roman', serif;
        }

        img {
            width: 100%;
            border-radius: 8px;
            margin: 20px 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .text-content {
            text-align: justify;
            margin-bottom: 30px;
        }

        /* Bố trí nút điều hướng */
        .navigation-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px; /* Khoảng cách giữa icon và chữ */
            color: #666;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Nút bản đồ 360 nổi bật hơn */
        .vr-btn {
            background: var(--maroon);
            color: #fff !important;
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 12px rgba(114, 47, 55, 0.2);
        }

        .back-btn:hover {
            color: var(--maroon);
            transform: translateX(-5px); /* Hiệu ứng trượt nhẹ sang trái */
        }

        .vr-btn:hover {
            background: var(--gold);
            transform: translateX(5px); /* Hiệu ứng trượt nhẹ sang phải */
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=yEV8JPpi"></script>
</head>
<body>
    <div id="particles-js"></div>
    <section class="container">
        <div id="heritage-info">
            <p>Đang tải nội dung...</p>
        </div>
        <div id="map" style="width: 100%; height: 400px; border-radius: 8px; margin-top: 20px; z-index: 10;"></div>
        <div id="navigation-area"></div>
    </section>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const alias = urlParams.get('alias');
        let detailContentForVoice = ""; // Biến lưu text thuần để đọc

        // Hàm loại bỏ tag HTML để lấy text thuần
        function stripHtmlTags(html) {
            if (!html) return "";
            const doc = new DOMParser().parseFromString(html, 'text/html');
            return doc.body.textContent || "";
        }

        async function readJSON(path) {
            const response = await fetch(path);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return await response.json();
        }

        async function loadDetail() {
            try {
                const [items] = await Promise.all([
                    readJSON('data/heritages.json')
                ]);

                const script = document.createElement('script');
                script.src = `data/details/${alias}.js`;

                script.onload = async function () {
                    const details = jsonData; // Giả định file JS định nghĩa jsonData
                    const item = items.find(h => h.alias === alias);

                    if (item && details) {
                        // Xử lý text thuần phục vụ giọng đọc
                        detailContentForVoice = stripHtmlTags(details.content);

                        // 1. Cập nhật thông tin chi tiết
                        document.getElementById('heritage-info').innerHTML = `
                            <div class="relative">
                                <h1>${item.name}</h1>
                                <button id="btn-play" class="absolute top-0 right-0 w-10 h-10 bg-white shadow-md rounded-full flex items-center justify-center hover:bg-maroon hover:text-white transition-all z-20 group">
                                    <i class="fa-solid fa-volume-high"></i>
                                    <span class="absolute right-12 bg-black/70 text-white text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Thuyết minh AI</span>
                                </button>
                            </div>
                            <div class="text-content">${details.content}</div>
                        `;

                        // Gán sự kiện click NGAY SAU KHI tạo nút
                        document.getElementById('btn-play').onclick = playVoice;

                        // 2. Cập nhật nút điều hướng
                        document.getElementById('navigation-area').innerHTML = `
                            <div class="navigation-row">
                                <a href="index.html" class="back-btn">
                                    <i class="fa-solid fa-arrow-left-long"></i> Trang chủ
                                </a>
                                <a href="vr360.html?alias=${alias}" class="back-btn vr-btn">
                                    Bản đồ 360 <i class="fa-solid fa-arrow-right-long"></i>
                                </a>
                            </div>
                        `;

                        // 3. Khởi tạo bản đồ
                        const map = L.map('map', { scrollWheelZoom: false }).setView([item.lat, item.lng], 10);
                        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

                        L.marker([item.lat, item.lng]).addTo(map).bindPopup(`
                            <div class="text-center p-1">
                                <img src="${item.img}" alt="${item.name}" style="height: auto; border-radius: 4px; margin-bottom: 8px;">
                                <br><strong style="color:#722F37">${item.name}</strong>
                            </div>
                        `).openPopup();

                        $(window).on('resize', function () { map.invalidateSize(); });

                    } else {
                        document.getElementById('heritage-info').innerHTML = "<h1>Không tìm thấy di sản!</h1>";
                        document.getElementById('map').style.display = 'none';
                    }
                }
                document.head.appendChild(script);

            } catch (error) {
                console.error("Lỗi nạp dữ liệu:", error);
            }
        }

        function playVoice() {
            if (responsiveVoice.isPlaying()) {
                responsiveVoice.cancel();
                updateButtonIcon(false);
                return;
            }

            // Đọc detailContentForVoice đã được làm sạch
            responsiveVoice.speak(detailContentForVoice, "Vietnamese Female", {
                pitch: 1,
                rate: 0.9,
                onstart: () => updateButtonIcon(true),
                onend: () => updateButtonIcon(false)
            });
        }

        function updateButtonIcon(isPlaying) {
            const btnIcon = document.querySelector('#btn-play i');
            if (btnIcon) {
                btnIcon.className = isPlaying ? 'fa-solid fa-stop text-red-600' : 'fa-solid fa-volume-high';
            }
        }

        // Khởi tạo hiệu ứng hạt
        particlesJS('particles-js', {
            particles: {
                number: { value: 30 }, color: { value: '#722F37' },
                opacity: { value: 0.1 }, move: { speed: 1 }
            }
        });

        loadDetail();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Di sản văn hóa phi vật thể</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.css" />

    <style>
        :root {
            --maroon: #722F37;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: sans-serif;
        }

        #panorama {
            width: 100%;
            height: 100%;
        }

        /* Minimap & Markers */
        .minimap {
            bottom: 25px;
            right: 25px;
            width: 260px;
            height: 170px;
            background: #fff;
            border: 4px solid #fff;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            overflow: hidden;
            position: absolute;
            z-index: 100;
        }

        .map-marker {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #ef4444;
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            z-index: 101;
            transition: 0.3s;
        }

            .map-marker.active {
                background: #22c55e;
                box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.3);
            }
        /* Tooltip cơ bản cho tất cả Marker */
        .map-marker {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #ef4444;
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            z-index: 101;
            transition: 0.3s;
        }

            /* Cấu trúc Tooltip dùng data-name */
            .map-marker::after {
                content: attr(data-name);
                position: absolute;
                bottom: 130%;
                left: 50%;
                transform: translateX(-50%);
                background: rgba(0, 0, 0, 0.8);
                color: #fff;
                padding: 4px 10px;
                border-radius: 4px;
                font-size: 10px;
                white-space: nowrap;
                opacity: 0; /* Mặc định ẩn */
                pointer-events: none;
                transition: all 0.3s ease;
            }

            /* Hiện tooltip khi Hover */
            .map-marker:hover::after {
                opacity: 1;
            }

            /* --- TRẠNG THÁI ACTIVE: LUÔN HIỆN TÊN --- */
            .map-marker.active {
                background: #22c55e;
                box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.3);
                z-index: 110; /* Ưu tiên nằm trên các marker khác */
            }

                .map-marker.active::after {
                    opacity: 1; /* Luôn hiển thị */
                    background: #22c55e; /* Đổi màu nền tooltip active cho đồng bộ */
                    font-weight: bold;
                }

                /* Mũi tên nhỏ cho Tooltip Active */
                .map-marker.active::before {
                    content: '';
                    position: absolute;
                    bottom: 110%;
                    left: 50%;
                    transform: translateX(-50%);
                    border: 5px solid transparent;
                    border-top-color: #22c55e;
                    opacity: 1;
                }

        /* Loading Screen */
        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #722F37;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: opacity 0.8s;
        }

        /* Helper Classes */
        .ui-overlay {
            position: absolute;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-white mb-4"></div>
        <p class="uppercase tracking-widest text-sm font-bold">Đang khởi tạo không gian...</p>
    </div>

    <div id="panorama"></div>

    <div class="ui-overlay top-6 left-6 flex items-center gap-4">
        <button onclick="history.back()" class="w-12 h-12 bg-white/90 rounded-full flex items-center justify-center shadow-lg hover:bg-red-800 hover:text-white transition-all">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div class="bg-white/90 backdrop-blur-md px-6 py-3 rounded-2xl shadow-xl border-l-4 border-red-800">
            <h1 class="text-red-900 font-bold uppercase text-sm tracking-tighter" id="title-display">Đang tải...</h1>
            <p id="heritage-sub" class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Dữ liệu di sản số</p>
        </div>
    </div>

    <div class="ui-overlay bottom-6 left-1/2 -translate-x-1/2 bg-black/40 text-white/80 px-4 py-2 rounded-full text-[10px] uppercase tracking-widest backdrop-blur-sm pointer-events-none">
        Kéo chuột để xoay • Cuộn để phóng to
    </div>

    <div id="minimap-block" class="minimap hidden md:block">
        <div class="absolute top-0 left-0 bg-red-800 text-[8px] text-white px-3 py-1 font-bold rounded-br-lg z-10 uppercase">Sơ đồ vị trí</div>
        <button id="btn-play" class="absolute top-2 right-2 w-8 h-8 bg-white/90 rounded-full shadow-lg flex items-center justify-center hover:bg-red-800 hover:text-white transition-all z-20 group">
            <i class="fa-solid fa-volume-high text-xs group-active:scale-90"></i>
            <span class="absolute right-10 bg-black/70 text-white text-[8px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Thuyết minh</span>
        </button>
        <img id="minimap-img" src="" class="w-full h-full object-cover opacity-90">
        <div id="markers-layer" class="absolute inset-0"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5.0/dist/fancybox/fancybox.umd.js"></script>
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=yEV8JPpi"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const alias = urlParams.get('alias');
        let viewer;
        let vrConfig = {};
        let detailContent = ""; // Biến lưu trữ văn bản đã lọc để đọc

        /**
         * Hàm tiện ích: Loại bỏ các thẻ HTML để lấy văn bản thuần
         * Giúp ResponsiveVoice không đọc các thẻ như <div>, <p>, <br>...
         */
        function stripHtmlTags(html) {
            if (!html) return "";
            const doc = new DOMParser().parseFromString(html, 'text/html');
            return doc.body.textContent || "";
        }

        async function initVR() {
            if (!alias) return;

            try {
                // 1. Tải cấu hình VR360
                const response = await fetch(`data/vr360/${alias}.json`);
                vrConfig = await response.json();

                // 2. Tải script chi tiết di sản (chứa jsonData)
                const script = document.createElement('script');
                script.src = `data/details/${alias}.js`;

                script.onload = function () {
                    if (typeof jsonData !== 'undefined' && jsonData.content) {
                        // Xử lý loại bỏ tag HTML ngay khi tải xong dữ liệu
                        detailContent = stripHtmlTags(jsonData.content);
                        console.log("Dữ liệu thuyết minh đã sẵn sàng.");
                    }
                };
                document.head.appendChild(script);

                // 3. Cấu hình giao diện ban đầu
                document.getElementById('minimap-img').src = vrConfig.minimapImage;
                document.getElementById('heritage-sub').innerText = vrConfig.heritageName;

                // 4. Khởi tạo Pannellum
                viewer = pannellum.viewer('panorama', {
                    "default": {
                        "firstScene": vrConfig.firstScene,
                        "autoLoad": true,
                        "sceneFadeDuration": 1200,
                        "showControls": false
                    },
                    "scenes": processScenes(vrConfig.scenes)
                });

                initMarkers();

                viewer.on('load', () => {
                    document.getElementById('loading-overlay').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading-overlay').style.display = 'none';
                    }, 800);
                });

            } catch (error) {
                console.error("Lỗi khởi tạo hệ thống:", error);
            }
        }

        /**
         * Xử lý phát giọng đọc thuyết minh
         */
        function playVoice() {
            // Kiểm tra nếu ResponsiveVoice đang đọc thì dừng lại (Toggle mode)
            if (responsiveVoice.isPlaying()) {
                responsiveVoice.cancel();
                updateButtonIcon(false);
                return;
            }

            const currentSceneId = viewer.getScene();
            const sceneTitle = vrConfig.scenes[currentSceneId].title;

            // Nội dung ưu tiên: detailContent từ file chi tiết, nếu trống thì đọc tiêu đề cảnh
            const textToRead = detailContent || `Bạn đang tham quan ${sceneTitle}.`;

            responsiveVoice.speak(textToRead, "Vietnamese Female", {
                pitch: 1,
                rate: 0.9, // Tốc độ vừa phải để người dùng dễ tiếp nhận thông tin di sản
                onstart: () => updateButtonIcon(true),
                onend: () => updateButtonIcon(false)
            });
        }

        function updateButtonIcon(isPlaying) {
            const btnIcon = document.querySelector('#btn-play i');
            if (isPlaying) {
                btnIcon.className = 'fa-solid fa-stop text-red-600';
            } else {
                btnIcon.className = 'fa-solid fa-volume-high';
            }
        }

        function initMarkers() {
            const layer = document.getElementById('markers-layer');
            if (!layer) return;
            layer.innerHTML = '';

            Object.keys(vrConfig.scenes).forEach(id => {
                const scene = vrConfig.scenes[id];
                const marker = document.createElement('div');
                marker.className = `map-marker marker-${id}`;
                marker.style.left = scene.mapX + '%';
                marker.style.top = scene.mapY + '%';
                marker.setAttribute('data-name', scene.title);
                marker.onclick = () => viewer.loadScene(id);
                layer.appendChild(marker);
            });

            viewer.on('load', () => {
                const currentId = viewer.getScene();
                document.getElementById('title-display').innerText = vrConfig.scenes[currentId].title;
                document.querySelectorAll('.map-marker').forEach(m => m.classList.remove('active'));
                const activeMarker = document.querySelector(`.marker-${currentId}`);
                if (activeMarker) activeMarker.classList.add('active');
            });
        }

        // Các hàm bổ trợ xử lý Hotspot
        function openGallery(images) {
            const slides = images.map(img => ({ src: img, type: "image" }));
            Fancybox.show(slides);
        }

        function processScenes(scenes) {
            Object.keys(scenes).forEach(key => {
                const scene = scenes[key];
                if (scene.hotSpots) {
                    scene.hotSpots.forEach(hs => {
                        if (hs.videoUrl) {
                            hs.clickHandlerFunc = (e, args) => {
                                Fancybox.show([{
                                    src: args.url,
                                    type: "iframe",
                                    width: 1280,
                                    height: 720
                                }]);
                            };
                            hs.clickHandlerArgs = { url: hs.videoUrl };
                        }
                        if (hs.gallery) {
                            hs.clickHandlerFunc = (e, args) => openGallery(args.imgs);
                            hs.clickHandlerArgs = { imgs: hs.gallery };
                        }
                    });
                }
            });
            return scenes;
        }

        // Gán sự kiện click cho nút âm thanh
        document.getElementById('btn-play').onclick = playVoice;

        // Khởi chạy hệ thống
        initVR();
    </script>
</body>
</html>
